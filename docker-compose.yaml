name: taxa_hfe

services:
  rstudio:
    # this will try to pull a remote image of taxa_hfe_rstudio for development
    # if one can't be found for some reason, it will build the local version
    # defined in the Dockerfile under the "rstudio" target
    image: aoliver44/taxa_hfe_rstudio
    build:
      context: .
      target: rstudio
    ports:
      8787:8787
    volumes:
      - .:/home/rstudio
    environment:
      PASSWORD: rstudio